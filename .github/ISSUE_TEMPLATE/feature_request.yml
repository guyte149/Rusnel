name: Feature request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [`ROADMAP.md`](../../ROADMAP.md)
        — your idea may already be tracked there.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is currently hard or impossible?
      placeholder: I want to expose a UDP service through a SOCKS5 chain, but...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A new flag, a new tunnel mode, a config option, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related projects, RFCs, or prior art.
    validations:
      required: false
