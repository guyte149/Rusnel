name: CI

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version bump check
        run: |
          PR_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          BASE_VERSION=$(git show origin/master:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version in Cargo.toml ($PR_VERSION) was not bumped from master ($BASE_VERSION)"
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION -> $PR_VERSION"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Test
        run: cargo test --all

  # Windows-host build/test. The admin API and `rusnel ctl` are
  # unix-only (#[cfg(unix)]); the rest of rusnel — tunnels, TLS,
  # embedded credentials — must keep compiling and passing tests on
  # Windows so the cross-platform claim doesn't silently regress.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all

      - name: Test (lib + bin only; integration tests gated to unix)
        run: cargo test --lib --bins
